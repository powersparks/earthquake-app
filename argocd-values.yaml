# Override values for argocd pod.
# repositories:
#   - url: https://github.com/powersparks/my-next-app.git
#     passwordSecret:
#       name: github-credentials
#       key: password
#     usernameSecret:
#       name: github-credentials
#       key: username
# This is a YAML-formatted file.
repoServer:
  volumes:
    - name: local-repo
      hostPath:
        path: /Users/harleyparks/repos/local/earthquake-app
        type: Directory
  volumeMounts:
    - name: local-repo
      mountPath: /mnt/argocd-repo
      readOnly: true
# PostgreSQL StatefulSet
postgresqlServer:
  volumeMounts:
    - name: postgres-data
      mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi
server:
  extensions:
    enabled: true
    extensionList:
      - name: extension-trivy
        env:
          # URLs used in example are for the latest release, replace with the desired version if needed
          - name: EXTENSION_URL
            value: https://github.com/mziyabo/argocd-trivy-extension/releases/latest/download/extension-trivy.tar
          - name: EXTENSION_CHECKSUM_URL
            value: https://github.com/mziyabo/argocd-trivy-extension/releases/latest/download/extension-trivy_checksums.txt

