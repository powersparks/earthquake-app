# Default values for earthquake-app-chart

# Global settings
replicaCount: 2
nameOverride: ""
fullnameOverride: ""

# Service Account
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod settings
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

# Global service settings (not used by individual services)
service:
  type: ClusterIP
  port: 8000

# Backend configuration
backend:
  enabled: true
  replicaCount: 1
  imagePullSecrets:
    - name: dockerhub-regcred
  image:
    repository: powersparks/earthquake-backend
    tag: "latest"
    pullPolicy: Always # IfNotPresent
  nodeSelector:
    kubernetes.io/arch: amd64
  service:
    type: ClusterIP
    port: 8000

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 1
  imagePullSecrets:
    - name: dockerhub-regcred
  image:
    repository: powersparks/earthquake-frontend
    tag: "latest"
    pullPolicy: Always # IfNotPresent
  nodeSelector:
    kubernetes.io/arch: amd64
  service:
    type: NodePort
    port: 3000

# PostgreSQL configuration
postgresql:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: earthquake_db
  username: postgres
  password: postgres
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 10Gi

# Image pull secrets
imagePullSecrets:
  - name: dockerhub-regcred

# Resources
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Volumes
volumes: []
volumeMounts: []

# Node, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}

# Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: earthquakes-example.bah.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []


# HTTPRoute (Gateway API)
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
