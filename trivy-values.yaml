image:
  registry: "docker.io"
  repository: "aquasec/trivy-operator"
  tag: ""
  pullPolicy: IfNotPresent

trivy:
  dbRegistry: "docker.io"
  dbRepository: "aquasec/trivy-db"
  javaDbRegistry: "docker.io"
  javaDbRepository: "aquasec/trivy-java-db"
  image:
    registry: "docker.io"
    repository: "aquasec/trivy"
    tag: "latest"
    pullPolicy: IfNotPresent
  
  vulnType: "os,library"
  severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
  ignoreUnfixed: false
  timeout: 10m0s
  offlineScan: false
  mode: Standalone
  slow: true
  command: image
  debug: false

  server:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi

scanJob:
  image:
    tag: "latest"
  scanners:
    - Vulnerability

serviceMonitor:
  enabled: true

namespaceSelector:
  matchLabels: {}

podSecurityStandards:
  enabled: false

policiesBundle:
  registry: "docker.io"
  repository: "aquasec/trivy-checks"
  tag: "1"

nodeCollector:
  useNodeSelector: true
  registry: "docker.io"
  repository: "aquasec/node-collector"
  tag: "0.3.1"
