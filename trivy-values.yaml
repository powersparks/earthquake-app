serviceMonitor:
  enabled: true

namespaceSelector:
  matchLabels: {}

podSecurityStandards:
  enabled: false

policiesBundle:
  registry: "docker.io"
  repository: "aquasec/trivy-checks"
  tag: "1"

nodeCollector:
  useNodeSelector: true
  registry: "ghcr.io"
  repository: "aquasecurity/node-collector" # "aquasec/node-collector"
  tag: "0.3.1"

operator:
  builtInTrivyServer: true # false standalone | true clientserver
  metricsVulnIdEnabled: true
  scanJobTTLSecondsAfterFinished: 300
  privateRegistryScanSecretsNames: { "default": "dockerhub-regcred","trivy-system": "dockerhub-regcred" }
  # privateRegistryScanSecretsNames: 
  #   default: dockerhub-regcred
  #   trivy-system: dockerhub-regcred
  
  scanJobsConcurrencyLimit: 1
  accessGlobalSecretsAndServiceAccount: true
  
  # scanJobTTLSecondsAfterFinished: 300
  vulnerabilityReports:
    scanJobsInSameNamespace: true
