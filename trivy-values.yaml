image:
  registry: "docker.io"
  repository: "aquasec/trivy-operator"
  tag: "0.30.1"
  pullPolicy: IfNotPresent
  pullSecrets:
    - name: dockerhub-regcred
  

trivy:
  dbRegistry: public.ecr.aws
  dbRepository: aquasecurity/trivy-db
  # dbRegistry: "docker.io"
  # dbRepository: "aquasec/trivy-db" #tags latest and 2 exist
  javaDbRegistry: public.ecr.aws
  javaDbRepository: aquasecurity/trivy-java-db
  # javaDbRegistry: "docker.io"
  # javaDbRepository: "aquasec/trivy-java-db" #tag 1 exist only
  env:
    - name: DOCKER_CONFIG
      value: /root/.docker
  image:
    registry: "docker.io"
    repository: "aquasec/trivy"
    tag: 0.69.3 # canary
    pullPolicy: IfNotPresent
    imagePullSecret: dockerhub-regcred
  # Add auth for the DB repo
  skipDBUpdate: false
  # Trivy will read /etc/trivy/.dockerconfigjson automatically
  registryInsecure: false 
  vulnType: "os,library"
  severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
  ignoreUnfixed: false
  timeout: 10m0s
  offlineScan: false
  mode: Standalone
  slow: true
  command: image
  debug: false

  server:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
 
scanJob:
  # image:
  #   tag: "latest"
  scanners:
    - Vulnerability
